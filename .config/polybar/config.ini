[defaults]
font = CaskaydiaCove Nerd Font:size=8:weight=bold;3 

[colors]
black = #000000
white = #ffffff
transparent = #00000000

background = ${colors.black}
foreground = ${colors.white}
background-alt = ${colors.black}
foreground-alt = ${colors.white}

[bar/main]
monitor = ${env:MONITOR:}

font-0 = ${defaults.font}

background = ${colors.background}
foreground = ${colors.foreground}

width = 100%
height = 24pt

radius = 5
border-size = 15px
border-bottom-size = 0
border-color = ${colors.transparent}
 
padding-left = 1
padding-right = 1

modules-left = xworkspaces
modules-center = xwindow
modules-right = network memory cpu battery date

module-margin = 1

tray-position = right
tray-detached = false
tray-transparent = true

wm-restack = i3

[module/xwindow]
type = internal/xwindow

label = %title%

label-empty = Empty

[module/xworkspaces]
type = internal/xworkspaces

enable-click = false
enable-scroll = false

label-active = 
label-active-foreground = ${colors.foreground-alt}
label-active-background = ${colors.background-alt}
label-active-padding = 1

label-occupied = 
label-occupied-padding = 1

label-urgent-padding = 1

label-empty-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
label = %gb_used:2%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/network]
inherit = network-base
interface-type = wireless
interface = wlan0
label-connected = NETWORK %essid% %downspeed:9%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%

[module/battery]
type = internal/battery

full-at = 99

low-at = 5

battery = BAT0
adapter = ADP1

poll-interval = 5

[settings]
screenchange-reload = true
pseudo-transparency = true

